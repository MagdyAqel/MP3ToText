<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>محول MP3 إلى نص</title>
  <style>
    :root { --bg:#f4f6f8; --panel:#fff; --line:#d7dee6; --text:#15202b; --muted:#5d6975; --blue:#1f5eff; --green:#16845b; --red:#b3261e; --amber:#b56b00; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:"Segoe UI",Tahoma,Arial,sans-serif; font-size:15px; line-height:1.45; }
    .app { width:min(1180px,calc(100vw - 32px)); margin:18px auto; display:grid; grid-template-rows:auto auto 1fr; gap:12px; min-height:calc(100vh - 36px); }
    header { display:flex; justify-content:space-between; align-items:center; gap:16px; }
    h1 { margin:0; font-size:24px; font-weight:700; }
    .status-pill { border:1px solid var(--line); background:var(--panel); color:var(--muted); border-radius:8px; padding:8px 10px; min-width:220px; text-align:center; }
    .grid { display:grid; grid-template-columns:minmax(0,1.35fr) minmax(330px,.85fr); gap:12px; }
    section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; }
    h2 { margin:0 0 12px; font-size:16px; font-weight:700; }
    label { display:block; margin:10px 0 5px; font-weight:600; }
    input[type="password"],select,textarea { width:100%; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--text); padding:9px 10px; font:inherit; }
    textarea { resize:vertical; min-height:84px; }
    input[type="file"] { width:100%; border:1px dashed #a6b3c1; border-radius:8px; padding:16px; background:#f9fbfd; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .checks { display:flex; justify-content:space-between; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }
    .checks label { display:flex; align-items:center; gap:7px; margin:0; font-weight:500; }
    .actions,.editor-actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:14px; }
    button { border:1px solid transparent; border-radius:8px; padding:10px 12px; font:inherit; font-weight:700; cursor:pointer; }
    button:disabled { cursor:not-allowed; opacity:.55; }
    .primary { background:var(--blue); color:#fff; } .save { background:var(--green); color:#fff; } .secondary { background:#fff; color:var(--text); border-color:var(--line); } .danger { background:#fff; color:var(--red); border-color:#efb8b2; }
    .progress-wrap { display:grid; grid-template-columns:70px 1fr; gap:10px; align-items:center; margin-top:12px; }
    .bar { height:14px; background:#e5ebf1; border-radius:99px; overflow:hidden; } .bar>div { height:100%; width:0; background:linear-gradient(90deg,var(--blue),var(--green)); transition:width 180ms ease; }
    .file-list,.project-list,.source-list { border:1px solid var(--line); border-radius:8px; background:#fbfcfe; padding:8px; overflow:auto; }
    .file-list { margin-top:10px; min-height:86px; max-height:156px; }
    .file-list div { display:flex; justify-content:space-between; gap:8px; padding:5px 0; border-bottom:1px solid #edf1f5; }
    .workspace { display:grid; grid-template-columns:minmax(230px,.75fr) minmax(0,.85fr) minmax(0,1.25fr); gap:12px; min-height:330px; }
    .project-list { min-height:280px; max-height:calc(100vh - 390px); }
    .project-item { width:100%; display:block; text-align:right; background:#fff; border:1px solid var(--line); color:var(--text); margin-bottom:8px; font-weight:600; }
    .project-item small { display:block; color:var(--muted); font-weight:400; margin-top:4px; }
    .project-title,.project-tools input,.business-grid input,.business-grid select { width:100%; border:1px solid var(--line); border-radius:6px; padding:8px 9px; font:inherit; }
    .project-title { font-weight:700; margin-bottom:8px; text-align:right; }
    .project-tools { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; margin:8px 0; }
    .source-list { margin:8px 0; max-height:92px; color:var(--muted); }
    .source-list div { padding:3px 0; border-bottom:1px solid #edf1f5; }
    .business-panel { border:1px solid var(--line); border-radius:8px; background:#fbfcfe; padding:10px; margin-top:10px; }
    .business-panel h3 { margin:0 0 8px; font-size:15px; }
    .business-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .business-grid label { margin:0; font-weight:600; }
    .quote-total { margin-top:8px; padding:9px; border-radius:8px; background:#eef6ff; color:var(--blue); font-weight:800; text-align:center; }
    pre,.preview { margin:0; border:1px solid var(--line); border-radius:8px; background:#fbfcfe; padding:12px; overflow:auto; white-space:pre-wrap; min-height:280px; max-height:calc(100vh - 390px); direction:rtl; width:100%; font:inherit; }
    .muted { color:var(--muted); } .warning { color:var(--amber); } .error { color:var(--red); font-weight:700; margin-top:8px; min-height:22px; }
    @media(max-width:850px){ .grid,.workspace,.row,.actions,.editor-actions,.business-grid{grid-template-columns:1fr} header{align-items:stretch;flex-direction:column}.status-pill{width:100%} }
  </style>
</head>
<body>
<main class="app">
<header><h1>محول MP3 إلى نص</h1><div id="status" class="status-pill">جاهز</div></header>
<div class="grid">
<section><h2>الملفات</h2><input id="files" name="files" type="file" accept=".mp3,.m4a,.wav,.webm,.mp4,.mpeg,.mpga,audio/*" multiple><div id="fileList" class="file-list muted">لم يتم اختيار ملفات بعد</div><p class="muted">حد 25MB ينطبق على OpenAI API فقط؛ التحويل المحلي يستخدم الملف على الخادم.</p></section>
<section><h2>الإعدادات</h2>
<div class="row"><div><label for="engine">طريقة التحويل</label><select id="engine"><option value="local" selected>Whisper على الخادم</option><option value="api">OpenAI API</option></select></div><div id="localModelBox"><label for="localModel">النموذج</label><select id="localModel"><option value="small" selected>small - دقة أفضل</option><option value="base">base - أسرع</option><option value="tiny">tiny - الأسرع</option></select></div></div>
<div id="apiKeyBox"><label for="apiKey">مفتاح OpenAI API</label><input id="apiKey" type="password" autocomplete="off"></div>
<div class="row"><div><label for="language">اللغة</label><select id="language"><option value="ar" selected>العربية</option><option value="en">English</option><option value="">تلقائي</option></select></div><div id="apiModelBox"><label for="model">نموذج OpenAI</label><select id="model"><option value="gpt-4o-transcribe" selected>دقة عالية</option><option value="gpt-4o-mini-transcribe">أسرع وأقل تكلفة</option><option value="gpt-4o-transcribe-diarize">تمييز المتحدثين</option><option value="whisper-1">Whisper</option></select></div></div>
<label for="prompt">مصطلحات أو أسماء لتحسين الدقة</label><textarea id="prompt"></textarea>
<div class="checks"><label><input id="includeHeaders" type="checkbox" checked> إضافة أسماء الملفات</label><label><input type="radio" name="format" value="docx" checked> Word</label><label><input type="radio" name="format" value="txt"> Text</label></div>
<div class="checks"><label><input type="radio" name="outputMode" value="combined" checked> ملف واحد</label><label><input type="radio" name="outputMode" value="separate"> ملفات مستقلة</label></div>
</section></div>
<section><div class="actions"><button id="startBtn" class="primary">بدء التحويل</button><button id="saveBtn" class="save" disabled>حفظ الملف</button><button id="shutdownBtn" class="danger">إغلاق التطبيق</button></div><div class="progress-wrap"><div id="percent">0%</div><div class="bar"><div id="bar"></div></div></div><div id="error" class="error"></div></section>
<div class="workspace">
<section><h2>المشاريع</h2><div id="projects" class="project-list muted">لا توجد مشاريع محفوظة بعد</div></section>
<section><h2>السجل</h2><pre id="logs"></pre></section>
<section><h2>المحرر</h2><input id="projectTitle" class="project-title" placeholder="اسم المشروع" disabled><div class="project-tools"><input id="searchText" placeholder="بحث داخل النص" disabled><span id="searchCount" class="muted"></span></div><div id="sourceFiles" class="source-list">افتح مشروعًا أو ابدأ تحويلًا جديدًا</div><textarea id="preview" class="preview"></textarea><div id="projectMeta" class="muted"></div><div class="editor-actions"><button id="saveProjectBtn" class="secondary" disabled>حفظ التعديل</button><button id="downloadProjectBtn" class="save" disabled>تصدير المشروع</button><button id="deleteProjectBtn" class="danger" disabled>حذف المشروع</button></div>
<div class="business-panel"><h3>الطلب والتسعير</h3><div class="business-grid"><label>اسم العميل<input id="customerName" disabled></label><label>الباقة<select id="servicePackage" disabled><option value="auto" data-ils="20" data-usd="6">تفريغ آلي سريع</option><option value="formatted" data-ils="40" data-usd="11">تفريغ + تنسيق Word</option><option value="reviewed" data-ils="90" data-usd="25">تفريغ + مراجعة بشرية</option><option value="urgent" data-ils="130" data-usd="36">طلب عاجل</option></select></label><label>عدد الدقائق<input id="orderMinutes" type="number" min="0" step="1" disabled></label><label>العملة<select id="orderCurrency" disabled><option value="ILS">شيكل</option><option value="USD">دولار</option></select></label><label>حالة الطلب<select id="orderStatus" disabled><option value="new">جديد</option><option value="quoted">تم إرسال السعر</option><option value="paid">مدفوع</option><option value="delivered">تم التسليم</option><option value="archived">مؤرشف</option></select></label></div><div id="quoteTotal" class="quote-total">افتح مشروعًا لحساب السعر</div></div>
</section></div></main>
<script>
let jobId="",pollTimer=0,outputFilename="transcript.docx",currentProjectId="",saveTimer=0;
const $=id=>document.getElementById(id),filesInput=$("files"),fileList=$("fileList"),startBtn=$("startBtn"),saveBtn=$("saveBtn"),shutdownBtn=$("shutdownBtn"),statusEl=$("status"),errorEl=$("error"),logsEl=$("logs"),previewEl=$("preview"),barEl=$("bar"),percentEl=$("percent"),engineSelect=$("engine"),apiKeyBox=$("apiKeyBox"),apiModelBox=$("apiModelBox"),localModelBox=$("localModelBox"),projectsEl=$("projects"),projectMetaEl=$("projectMeta"),saveProjectBtn=$("saveProjectBtn"),downloadProjectBtn=$("downloadProjectBtn"),deleteProjectBtn=$("deleteProjectBtn"),projectTitleEl=$("projectTitle"),searchTextEl=$("searchText"),searchCountEl=$("searchCount"),sourceFilesEl=$("sourceFiles"),customerNameEl=$("customerName"),servicePackageEl=$("servicePackage"),orderMinutesEl=$("orderMinutes"),orderCurrencyEl=$("orderCurrency"),orderStatusEl=$("orderStatus"),quoteTotalEl=$("quoteTotal");
filesInput.addEventListener("change",renderFiles);startBtn.addEventListener("click",startJob);saveBtn.addEventListener("click",saveOutput);shutdownBtn.addEventListener("click",shutdownApp);saveProjectBtn.addEventListener("click",saveProjectEdits);downloadProjectBtn.addEventListener("click",downloadCurrentProject);deleteProjectBtn.addEventListener("click",deleteCurrentProject);projectTitleEl.addEventListener("input",scheduleProjectSave);previewEl.addEventListener("input",()=>{updateSearchCount();scheduleProjectSave()});searchTextEl.addEventListener("input",updateSearchCount);
[customerNameEl,servicePackageEl,orderMinutesEl,orderCurrencyEl,orderStatusEl].forEach(el=>{el.addEventListener("input",()=>{updateQuoteTotal();scheduleProjectSave()});el.addEventListener("change",()=>{updateQuoteTotal();scheduleProjectSave()})});engineSelect.addEventListener("change",()=>{updateEngineUi();renderFiles()});updateEngineUi();loadProjects();
function updateEngineUi(){const api=engineSelect.value==="api";apiKeyBox.style.display=api?"block":"none";apiModelBox.style.display=api?"block":"none";localModelBox.style.display=api?"none":"block"}
async function loadProjects(){try{const r=await fetch("/projects"),p=await r.json();if(!r.ok)throw Error(p.error||"تعذر تحميل المشاريع");renderProjects(p.projects||[])}catch(e){projectsEl.textContent=e.message;projectsEl.className="project-list warning"}}
function renderProjects(ps){projectsEl.innerHTML="";if(!ps.length){projectsEl.textContent="لا توجد مشاريع محفوظة بعد";projectsEl.className="project-list muted";return}projectsEl.className="project-list";ps.forEach(p=>{const b=document.createElement("button");b.className="project-item";b.type="button";const order=p.customer?` · ${escapeHtml(p.customer)} · ${labelOrderStatus(p.orderStatus)}`:"";b.innerHTML=`${escapeHtml(p.title||"مشروع")}<small>${p.fileCount||0} ملف · ${formatDate(p.updatedAt||p.createdAt)}${order}</small>`;b.onclick=()=>openProject(p.id);projectsEl.appendChild(b)})}
function setProjectControlsEnabled(v){[projectTitleEl,searchTextEl,saveProjectBtn,downloadProjectBtn,deleteProjectBtn,customerNameEl,servicePackageEl,orderMinutesEl,orderCurrencyEl,orderStatusEl].forEach(el=>el.disabled=!v)}
function renderSourceFiles(p){const fs=p.source_files||(p.items||[]).map(i=>i.filename).filter(Boolean);sourceFilesEl.innerHTML="";if(!fs.length){sourceFilesEl.textContent="لا توجد ملفات مصدر محفوظة";return}fs.forEach((f,i)=>{const d=document.createElement("div");d.textContent=`${i+1}. ${f}`;sourceFilesEl.appendChild(d)})}
function clearProjectEditor(){currentProjectId="";projectTitleEl.value="";searchTextEl.value="";searchCountEl.textContent="";sourceFilesEl.textContent="افتح مشروعًا أو ابدأ تحويلًا جديدًا";previewEl.value="";projectMetaEl.textContent="";customerNameEl.value="";servicePackageEl.value="auto";orderMinutesEl.value="";orderCurrencyEl.value="ILS";orderStatusEl.value="new";quoteTotalEl.textContent="افتح مشروعًا لحساب السعر";setProjectControlsEnabled(false)}
async function openProject(id){const r=await fetch(`/project?id=${encodeURIComponent(id)}`),p=await r.json();if(!r.ok){errorEl.textContent=p.error||"تعذر فتح المشروع";return}const x=p.project;currentProjectId=x.id;projectTitleEl.value=x.title||"مشروع";previewEl.value=x.transcript||"";fillOrder(x.order||{});renderSourceFiles(x);projectMetaEl.textContent=`${(x.items||[]).length} ملف · آخر تعديل ${formatDate(x.updated_at||x.created_at)}`;setProjectControlsEnabled(true);updateSearchCount();updateQuoteTotal();statusEl.textContent="تم فتح المشروع"}
async function saveProjectEdits(){if(!currentProjectId)return;clearTimeout(saveTimer);projectMetaEl.textContent="جاري الحفظ...";const r=await fetch("/project/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:currentProjectId,title:projectTitleEl.value,transcript:previewEl.value,order:collectOrder()})}),p=await r.json();if(!r.ok){errorEl.textContent=p.error||"تعذر حفظ التعديل";return}statusEl.textContent="تم حفظ التعديل";projectMetaEl.textContent=`تم الحفظ · ${formatDate(p.project.updated_at)}`;await loadProjects()}
function fillOrder(o){customerNameEl.value=o.customer||"";servicePackageEl.value=o.package||"auto";orderMinutesEl.value=Number(o.minutes||0)||"";orderCurrencyEl.value=o.currency||"ILS";orderStatusEl.value=o.status||"new"}
function collectOrder(){return{customer:customerNameEl.value.trim(),package:servicePackageEl.value,minutes:Number(orderMinutesEl.value||0),currency:orderCurrencyEl.value,status:orderStatusEl.value,total:calculateQuoteTotal()}}
function calculateQuoteTotal(){const s=servicePackageEl.selectedOptions[0],rate=Number(s?.dataset[orderCurrencyEl.value.toLowerCase()]||0),m=Math.max(0,Number(orderMinutesEl.value||0));return Math.round((m/60)*rate*100)/100}
function updateQuoteTotal(){if(!currentProjectId){quoteTotalEl.textContent="افتح مشروعًا لحساب السعر";return}const total=calculateQuoteTotal(),symbol=orderCurrencyEl.value==="USD"?"$":"₪",rate=Number(servicePackageEl.selectedOptions[0]?.dataset[orderCurrencyEl.value.toLowerCase()]||0);quoteTotalEl.textContent=`السعر: ${total.toFixed(2)} ${symbol} · ${rate} ${symbol} / ساعة`}
function labelOrderStatus(s){return({new:"جديد",quoted:"تم إرسال السعر",paid:"مدفوع",delivered:"تم التسليم",archived:"مؤرشف"})[s]||""}
function scheduleProjectSave(){if(!currentProjectId)return;projectMetaEl.textContent="تعديلات غير محفوظة...";clearTimeout(saveTimer);saveTimer=setTimeout(saveProjectEdits,1200)}
async function downloadCurrentProject(){if(!currentProjectId)return;const f=document.querySelector("input[name='format']:checked").value,m=document.querySelector("input[name='outputMode']:checked").value;await saveBlobFromUrl(`/project/download?id=${encodeURIComponent(currentProjectId)}&format=${f}&mode=${m}`)}
async function deleteCurrentProject(){if(!currentProjectId||!confirm("حذف هذا المشروع؟"))return;const r=await fetch("/project/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:currentProjectId})}),p=await r.json();if(!r.ok||!p.ok){errorEl.textContent=p.error||"تعذر حذف المشروع";return}clearProjectEditor();statusEl.textContent="تم حذف المشروع";await loadProjects()}
function updateSearchCount(){const q=searchTextEl.value.trim();if(!q){searchCountEl.textContent="";return}const h=previewEl.value.toLowerCase(),n=q.toLowerCase();let count=0,i=h.indexOf(n);while(i>=0){count++;i=h.indexOf(n,i+n.length)}searchCountEl.textContent=`${count} نتيجة`}
function renderFiles(){const fs=Array.from(filesInput.files||[]);if(!fs.length){fileList.textContent="لم يتم اختيار ملفات بعد";fileList.className="file-list muted";return}fileList.className="file-list";fileList.innerHTML="";fs.forEach(f=>{const r=document.createElement("div"),n=document.createElement("span"),s=document.createElement("span");n.textContent=f.name;s.textContent=formatSize(f.size);if(engineSelect.value==="api"&&f.size>25*1024*1024)s.className="warning";r.append(n,s);fileList.appendChild(r)})}
async function startJob(){errorEl.textContent="";saveBtn.disabled=true;clearProjectEditor();const fs=Array.from(filesInput.files||[]);if(!fs.length){errorEl.textContent="اختر ملفًا صوتيًا واحدًا على الأقل";return}const engine=engineSelect.value,key=$("apiKey").value.trim();if(engine==="api"&&!key){errorEl.textContent="أدخل مفتاح OpenAI API";return}const form=new FormData();form.append("engine",engine);form.append("apiKey",key);form.append("language",$("language").value);form.append("model",$("model").value);form.append("localModel",$("localModel").value);form.append("prompt",$("prompt").value);form.append("format",document.querySelector("input[name='format']:checked").value);form.append("outputMode",document.querySelector("input[name='outputMode']:checked").value);form.append("includeHeaders",$("includeHeaders").checked?"true":"false");fs.forEach(f=>form.append("files",f,f.name));setBusy(true);updateProgress(5);statusEl.textContent="جاري رفع الملفات";logsEl.textContent="";previewEl.value="";try{const r=await fetch("/start",{method:"POST",body:form}),p=await r.json();if(!r.ok)throw Error(p.error||"تعذر بدء التحويل");jobId=p.jobId;pollTimer=setInterval(pollStatus,900);await pollStatus()}catch(e){setBusy(false);errorEl.textContent=e.message;statusEl.textContent="تعذر بدء التحويل"}}
async function pollStatus(){if(!jobId)return;try{const r=await fetch(`/status?id=${encodeURIComponent(jobId)}`),s=await r.json();if(!r.ok)throw Error(s.error||"تعذر قراءة الحالة");statusEl.textContent=s.status||"";updateProgress(s.progress||0);logsEl.textContent=(s.logs||[]).join("\n");previewEl.value=s.preview||"";if(s.error){errorEl.textContent=s.error;stopPolling();setBusy(false)}if(s.done){outputFilename=s.filename||outputFilename;currentProjectId=s.projectId||"";if(currentProjectId){await loadProjects();await openProject(currentProjectId);projectMetaEl.textContent="تم حفظ التفريغ كمشروع"}saveBtn.disabled=false;stopPolling();setBusy(false)}}catch(e){errorEl.textContent=e.message;stopPolling();setBusy(false)}}
async function saveOutput(){if(jobId)await saveBlobFromUrl(`/download?id=${encodeURIComponent(jobId)}`)}
async function saveBlobFromUrl(url){const r=await fetch(url);if(!r.ok){errorEl.textContent="الملف غير جاهز للحفظ";return}const blob=await r.blob(),filename=r.headers.get("X-Filename")||outputFilename,link=document.createElement("a");link.href=URL.createObjectURL(blob);link.download=filename;document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(link.href),1000)}
async function shutdownApp(){statusEl.textContent="جاري إغلاق التطبيق";try{await fetch("/shutdown",{method:"POST"})}catch(_){}document.body.innerHTML="<main class='app'><section><h1>تم إغلاق التطبيق</h1></section></main>"}
function setBusy(v){startBtn.disabled=v;filesInput.disabled=v}function stopPolling(){if(pollTimer)clearInterval(pollTimer);pollTimer=0}function updateProgress(v){const n=Math.max(0,Math.min(100,Math.round(v)));barEl.style.width=`${n}%`;percentEl.textContent=`${n}%`}function formatDate(v){if(!v)return"";const d=new Date(v);return Number.isNaN(d.getTime())?"":d.toLocaleString("ar",{dateStyle:"short",timeStyle:"short"})}function escapeHtml(v){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[c])}function formatSize(b){if(!b)return"0 KB";const m=b/(1024*1024);return m>=1?`${m.toFixed(1)} MB`:`${(b/1024).toFixed(1)} KB`}
</script>
</body>
</html>
